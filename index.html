<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAX / Вход</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">
    <button id="theme-btn" class="theme-toggle">🌙</button>
    <div class="glass-card login-box">
        <div class="login-header">
            <img src="https://i.imgflip.com/1g8my4.jpg" alt="Avatar" class="login-logo">
            <h1 class="login-title">Messenger</h1>
            <p class="login-subtitle">Пожалуйста, представьтесь</p>
        </div>
        <div class="input-group">
            <input type="text" id="name-input" class="glass-input" placeholder="Имя (например, Иван)">
            <input type="text" id="username-input" class="glass-input" placeholder="Юзернейм (например, @ivan)">
        </div>
        <button id="login-btn" class="glass-button">Продолжить ➔</button>
    </div>
    <script src="login.js"></script>
</body>
</html>
